 <script>
  // 1. Инициализация базы данных Supabase напрямую в коде страницы
  const supabaseUrl = 'https://supabase.co';
  const supabaseKey = 'sb_publishable_8lh0pIQKFqHJul0SGvER0w__SY9r6Gm';
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  // 2. Функция для отправки данных регистрации нового пользователя
  async function registerUser(email, password, name) {
    const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
    });
    if (error) { 
        alert('Ошибка регистрации: ' + error.message); 
        return; 
    }
    if (data.user) { 
        alert('Успешно! Пользователь зарегистрирован в Supabase.'); 
    }
  }

  // 3. Функция для входа существующего пользователя
  async function loginUser(email, password) {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
    });
    if (error) { 
        alert('Ошибка входа: ' + error.message); 
        return; 
    }
    if (data.user) { 
        alert('Вы успешно вошли через Supabase!'); 
    }
  }

  // 4. Автоматический перехват нажатий кнопок на сайте
  document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('submit', async (event) => {
      event.preventDefault(); // Останавливаем отправку на старый сервер конструктора
      
      const form = event.target;
      const emailInput = form.querySelector('input[type="email"]');
      const passwordInput = form.querySelector('input[type="password"]');
      const nameInput = form.querySelector('input[type="text"]');
      
      if (!emailInput || !passwordInput) return;

      const email = emailInput.value;
      const password = passwordInput.value;
      const name = nameInput ? nameInput.value : 'Пользователь TizerPro';

      // Проверяем, нажал ли пользователь Вход или Регистрацию
      if (nameInput || form.innerText.includes('Регистрация')) {
        await registerUser(email, password, name);
      } else {
        await loginUser(email, password);
      }
    });
  });
</script>

<div style="position: fixed; bottom: 20px; left: 20px; background: #1e1e1e; padding: 20px; border: 2px solid gold; border-radius: 8px; z-index: 99999; color: white; width: 300px;">
  <h3 style="margin-top: 0; color: gold;">Тест Supabase (Регистрация)</h3>
  <input type="text" id="sb-name" placeholder="Имя" style="width: 100%; margin-bottom: 10px; padding: 5px; color: black;"><br>
  <input type="email" id="sb-email" placeholder="Email" style="width: 100%; margin-bottom: 10px; padding: 5px; color: black;"><br>
  <input type="password" id="sb-password" placeholder="Пароль (от 6 знаков)" style="width: 100%; margin-bottom: 10px; padding: 5px; color: black;"><br>
  <button id="sb-btn" style="width: 100%; padding: 8px; background: gold; color: black; font-weight: bold; border: none; cursor: pointer;">Зарегистрироваться</button>
</div>

<script>
  // Привязываем клик к нашей кнопке напрямую
  document.getElementById('sb-btn').addEventListener('click', async () => {
    const name = document.getElementById('sb-name').value;
    const email = document.getElementById('sb-email').value;
    const password = document.getElementById('sb-password').value;

    if (!email || !password) {
      alert('Заполните Email и Пароль!');
      return;
    }

    alert('Отправка в Supabase...');
    
    // Вызываем функцию signUp напрямую из библиотеки Supabase
    const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
    });

    if (error) { 
        alert('Ошибка базы: ' + error.message); 
    } else if (data.user) { 
        alert('УРА! Пользователь успешно создан в Supabase!'); 
    }
  </script>
