<script>
const supabaseUrl = "https://supabase.co";
const supabaseKey = "sb_publishable_8lhOpIQKFqhJul0SGVER0w__SY9r6Gz";
const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

const originalFetch = window.fetch;
window.fetch = async function(...args) {
    const url = args ? args.toString() : '';
    
    if (url.includes('register')) {
        try {
            const email = document.querySelector('input[type="email"]')?.value;
            const password = document.querySelector('input[type="password"]')?.value;
            
            if (!email || !password) {
                alert("Пожалуйста, заполните поля Email и Пароль");
                return new Response(JSON.stringify({ error: "Empty fields" }), { status: 400 });
            }

            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            
            alert("Регистрация успешна! Теперь вы можете войти.");
            window.location.href = '/';
            return new Response(JSON.stringify({ success: true, user: data.user }), { status: 200 });
        } catch (err) {
            alert("Ошибка регистрации в Supabase: " + err.message);
            return new Response(JSON.stringify({ error: err.message }), { status: 400 });
        }
    }
    
    if (url.includes('login') || url.includes('auth')) {
        try {
            const email = document.querySelector('input[type="email"]')?.value;
            const password = document.querySelector('input[type="password"]')?.value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = '/';
            return new Response(JSON.stringify({ success: true, token: data.session?.access_token }), { status: 200 });
        } catch (err) {
            alert("Ошибка входа в Supabase: " + err.message);
            return new Response(JSON.stringify({ error: err.message }), { status: 400 });
        }
    }

    return originalFetch(...args);
};
</script>
